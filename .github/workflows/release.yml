name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
    
    - name: Build
      working-directory: ./appinsight
      run: |
        go build -ldflags "-s -w -X github.com/wjq/appinsight/internal/cli.Version=${GITHUB_REF#refs/tags/}" -o ../appinsight ./cmd/appinsight
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: appinsight
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
